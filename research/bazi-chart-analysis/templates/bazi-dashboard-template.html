<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>八字命盘量化分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;background:#0a0a0f;color:#e0e0e0;padding:30px}
.container{max-width:1100px;margin:0 auto}
h1{text-align:center;font-size:28px;background:linear-gradient(135deg,#38bdf8,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.subtitle{text-align:center;color:#888;font-size:13px;margin-bottom:30px}
.bazi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:30px}
.bazi-pillar{background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:14px;padding:18px 12px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.bazi-pillar .label{font-size:11px;color:#888;margin-bottom:10px;letter-spacing:2px}
.bazi-pillar .tg{font-size:36px;font-weight:800;margin-bottom:6px}
.bazi-pillar .dz{font-size:32px;font-weight:800;margin-bottom:8px}
.bazi-pillar .info{font-size:11px;color:#aaa;line-height:1.6}
.bazi-pillar .shishen{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.tg-wood{color:#4ade80}.tg-fire{color:#f87171}.tg-earth{color:#fbbf24}.tg-metal{color:#a5b4fc}.tg-water{color:#38bdf8}
.ss-shishen{background:rgba(74,222,128,.2);color:#4ade80}.ss-piancai{background:rgba(251,146,60,.2);color:#fb923c}.ss-bijian{background:rgba(56,189,248,.2);color:#38bdf8}.ss-ri{background:rgba(192,132,252,.3);color:#c084fc}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:14px;padding:20px;border:1px solid rgba(255,255,255,.06)}
.chart-card h3{font-size:15px;color:#ccc;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}
.chart-card canvas{max-height:280px}
.yongshen-row{display:flex;gap:12px;margin-bottom:24px}
.yongshen-item{flex:1;background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:10px;padding:14px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.yongshen-item .emoji{font-size:28px;margin-bottom:6px}
.yongshen-item .label{font-size:12px;color:#999}
.yongshen-item .value{font-size:16px;font-weight:700;margin-top:4px}
.yongshen-item .reason{font-size:10px;color:#666;margin-top:4px;line-height:1.4}
.analysis-section{background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:14px;padding:24px;border:1px solid rgba(255,255,255,.06);margin-bottom:24px}
.analysis-section h3{font-size:16px;color:#ccc;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}
.analysis-section .item{margin-bottom:14px;padding:12px 16px;background:rgba(255,255,255,.03);border-radius:10px;border-left:3px solid #38bdf8}
.analysis-section .item h4{font-size:14px;color:#38bdf8;margin-bottom:6px}
.analysis-section .item p{font-size:12px;color:#aaa;line-height:1.8}
.analysis-section .item.warn{border-left-color:#f87171}.analysis-section .item.warn h4{color:#f87171}
.analysis-section .item.good{border-left-color:#4ade80}.analysis-section .item.good h4{color:#4ade80}
.analysis-section .item.purple{border-left-color:#c084fc}.analysis-section .item.purple h4{color:#c084fc}
.dayun-timeline{background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:14px;padding:24px;border:1px solid rgba(255,255,255,.06);margin-bottom:24px}
.dayun-timeline h3{font-size:15px;color:#ccc;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}
.dayun-bar{display:flex;gap:3px;margin-bottom:14px}
.dayun-segment{flex:1;text-align:center;padding:10px 4px;border-radius:8px;font-size:12px;font-weight:600}
.dayun-segment.active{box-shadow:0 0 12px rgba(56,189,248,.5);border:1px solid #38bdf8}
.dayun-segment .age{font-size:10px;color:#999;display:block;margin-top:3px}
.dayun-detail{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
.dayun-card{background:rgba(255,255,255,.03);border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,.06)}
.dayun-card .title{font-size:14px;font-weight:700;margin-bottom:6px}
.dayun-card .desc{font-size:12px;color:#aaa;line-height:1.7}
.liunian-box{background:linear-gradient(135deg,#1a1a2e,#2d1b69);border:1px solid rgba(139,92,246,.3);border-radius:14px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
.liunian-box::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(139,92,246,.1) 0%,transparent 70%)}
.liunian-box h3{font-size:18px;color:#c4b5fd;margin-bottom:12px;position:relative}
.highlight-tag{display:inline-block;background:rgba(139,92,246,.3);color:#c4b5fd;padding:3px 12px;border-radius:20px;font-size:12px;margin:3px 4px 3px 0}
.warn-tag{display:inline-block;background:rgba(248,113,113,.3);color:#f87171;padding:3px 12px;border-radius:20px;font-size:12px;margin:3px 4px 3px 0}
.good-tag{display:inline-block;background:rgba(74,222,128,.3);color:#4ade80;padding:3px 12px;border-radius:20px;font-size:12px;margin:3px 4px 3px 0}
.partner-section{background:linear-gradient(135deg,#1a1a2e,#1e1035);border:1px solid rgba(251,146,60,.3);border-radius:14px;padding:24px;margin-bottom:24px}
.partner-section h3{font-size:16px;color:#fb923c;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(251,146,60,.15)}
.rarity-badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;padding:6px 18px;border-radius:20px;font-size:14px;font-weight:700;margin-bottom:20px}
.footer{text-align:center;color:#555;font-size:11px;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.05)}
</style>
</head>
<body>
<div class="container">
<h1>标题</h1>
<p class="subtitle">出生信息</p>

</html>
